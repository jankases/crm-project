<div id="loginScreen" class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #f0f2f5; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;">
  
  <div class="card p-5 shadow-lg border-0" style="width: 100%; max-width: 420px; border-radius: 20px;">
    <div class="text-center mb-4">
      <div class="bg-primary text-white d-inline-flex justify-content-center align-items-center mb-3" style="width: 70px; height: 70px; border-radius: 50%;">
        <i class="fa-solid fa-user-lock fs-2"></i>
      </div>
      <h3 class="fw-bold text-primary">ระบบ CRM</h3>
      <p class="text-muted">กรุณาเข้าสู่ระบบด้วยอีเมลบริษัท</p>
    </div>
    
    <form id="loginForm" onsubmit="handleLogin(event); return false;">
      <div class="mb-3">
        <label class="form-label fw-medium text-dark">อีเมล (Email)</label>
        <div class="input-group">
          <span class="input-group-text bg-light text-primary"><i class="fa-solid fa-envelope"></i></span>
          <input type="email" class="form-control" id="loginEmail" required placeholder="เช่น surasak.jankasem@roche.com">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium text-dark">รหัสผ่าน (Password)</label>
        <div class="input-group">
          <span class="input-group-text bg-light text-primary"><i class="fa-solid fa-key"></i></span>
          <input type="password" class="form-control" id="loginPassword" required placeholder="ใส่รหัสผ่านของคุณ">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-2" id="loginBtn" style="border-radius: 8px; font-size: 1.1rem;">
        เข้าสู่ระบบ
      </button>

      <div class="d-flex justify-content-between mt-3 px-1">
        <a href="#" class="text-decoration-none fw-medium text-secondary" style="font-size: 0.9rem;" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">
          <i class="fa-solid fa-envelope-open-text me-1"></i>ลืมรหัสผ่าน
        </a>
        <a href="#" class="text-decoration-none fw-medium text-secondary" style="font-size: 0.9rem;" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
          <i class="fa-solid fa-key me-1"></i>เปลี่ยนรหัสผ่าน
        </a>
      </div>
    </form>
  </div>

  <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content" style="border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title fw-bold">📧 ลืมรหัสผ่าน</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <form onsubmit="handleForgotPassword(event)">
          <div class="modal-body p-4">
            <p class="text-muted mb-3" style="font-size: 0.95rem;"><i>ฟีเจอร์ส่งอีเมลไม่รองรับบนฐานข้อมูล Supabase แบบ Custom Auth กรุณาติดต่อผู้ดูแลระบบเพื่อขอรหัสผ่านใหม่ครับ</i></p>
          </div>
          <div class="modal-footer border-0 pb-4 px-4">
            <button type="button" class="btn btn-secondary fw-bold w-100 py-2" data-bs-dismiss="modal" style="border-radius: 8px;">
              ปิดหน้าต่าง
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content" style="border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title fw-bold">🔑 เปลี่ยนรหัสผ่าน</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <form id="changePasswordForm" onsubmit="handleChangePassword(event)">
          <div class="modal-body p-4">
            <div class="mb-3">
              <label class="form-label text-dark fw-medium">อีเมล (Email)</label>
              <input type="email" class="form-control bg-light" id="cpEmail" required placeholder="ใส่อีเมลของคุณ">
            </div>
            <div class="mb-3">
              <label class="form-label text-dark fw-medium">รหัสผ่านเดิม (Old Password)</label>
              <input type="password" class="form-control bg-light" id="cpOldPassword" required placeholder="ใส่รหัสผ่านเดิม">
            </div>
            <hr class="my-4 text-muted">
            <div class="mb-3">
              <label class="form-label text-dark fw-medium">รหัสผ่านใหม่ (New Password)</label>
              <input type="password" class="form-control bg-light" id="cpNewPassword" required placeholder="อย่างน้อย 5 ตัวอักษร, พิมพ์ใหญ่ 1, ตัวเลข 1">
            </div>
            <div class="mb-3">
              <label class="form-label text-dark fw-medium">ยืนยันรหัสผ่านใหม่</label>
              <input type="password" class="form-control bg-light" id="cpConfirmPassword" required placeholder="พิมพ์รหัสผ่านใหม่อีกครั้ง">
            </div>
          </div>
          <div class="modal-footer border-0 pb-4 px-4">
            <button type="submit" class="btn btn-primary fw-bold w-100 py-2" id="submitChangePassBtn" style="border-radius: 8px;">
              ยืนยันการเปลี่ยนรหัสผ่าน
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

</div>

<script>
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>กำลังตรวจสอบ...`;

    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value.trim();

    try {
      const { data: users, error } = await supabaseClient
        .from('Rep_Users')
        .select('*')
        .eq('Email', email)
        .eq('Password', pass)
        .eq('Status', 'Active'); 

      if (error) throw error;

      if (users && users.length > 0) {
        const user = users[0];
        sessionStorage.setItem('crmUser', JSON.stringify(user));
        sessionStorage.setItem('loginTime', Date.now()); 
        
        if (typeof saveUserLog === 'function') {
          saveUserLog(user, "Login");
        }
        
        document.getElementById('loginForm').reset();
        
        if (typeof checkSession === 'function') checkSession(); 
        if (typeof loadVisitLogs === 'function') loadVisitLogs();
        if (typeof loadVisitDropdowns === 'function') loadVisitDropdowns();
      } else {
        alert("❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง หรือบัญชีถูกระงับ");
      }
    } catch (err) {
      alert("❌ เซิร์ฟเวอร์เกิดข้อผิดพลาด: " + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'เข้าสู่ระบบ';
    }
  }

  function handleForgotPassword(e) {
    e.preventDefault();
  }

  async function handleChangePassword(e) {
    e.preventDefault();
    
    const email = document.getElementById('cpEmail').value.trim();
    const oldPassword = document.getElementById('cpOldPassword').value;
    const newPassword = document.getElementById('cpNewPassword').value;
    const confirmPassword = document.getElementById('cpConfirmPassword').value;
    
    if (newPassword.length < 5) return alert("❌ รหัสผ่านใหม่ต้องมีอย่างน้อย 5 ตัวอักษร");
    if (!/[A-Z]/.test(newPassword)) return alert("❌ รหัสผ่านใหม่ต้องมีตัวพิมพ์ใหญ่อย่างน้อย 1 ตัว (A-Z)");
    if (!/[0-9]/.test(newPassword)) return alert("❌ รหัสผ่านใหม่ต้องมีตัวเลขอย่างน้อย 1 ตัว (0-9)");
    if (newPassword !== confirmPassword) return alert("❌ รหัสผ่านใหม่และการยืนยันไม่ตรงกัน");
    
    const btn = document.getElementById('submitChangePassBtn');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>กำลังตรวจสอบ...`;
    
    try {
      const { data: users, error: checkError } = await supabaseClient
        .from('Rep_Users')
        .select('*')
        .eq('Email', email)
        .eq('Password', oldPassword);

      if (checkError) throw checkError;

      if (!users || users.length === 0) {
        throw new Error("อีเมลหรือรหัสผ่านเดิมไม่ถูกต้อง");
      }

      const { error: updateError } = await supabaseClient
        .from('Rep_Users')
        .update({ Password: newPassword })
        .eq('Email', email);

      if (updateError) throw updateError;

      alert("✅ เปลี่ยนรหัสผ่านเรียบร้อยแล้ว กรุณาเข้าสู่ระบบใหม่");
      document.getElementById('changePasswordForm').reset();
      
      const modalEl = document.getElementById('changePasswordModal');
      const modalObj = bootstrap.Modal.getInstance(modalEl);
      if (modalObj) modalObj.hide();

    } catch (err) {
      alert("❌ " + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = "ยืนยันการเปลี่ยนรหัสผ่าน";
    }
  }
</script>
