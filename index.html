<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM System</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    #appContainer { padding-top: 15px; display: none; } 
    .nav-tabs { background: #fff; padding: 10px 10px 0; border-bottom: 2px solid #e7f1ff; border-radius: 15px 15px 0 0; margin: 0 15px; }
    .nav-link { border: none !important; color: #6c757d; font-weight: 500; padding: 12px 20px; border-radius: 10px 10px 0 0 !important; margin-right: 5px; }
    .nav-link.active { background-color: #e7f1ff !important; color: #0d6efd !important; font-weight: bold; border-bottom: 3px solid #0d6efd !important; }
    .tab-content { background: #fff; padding: 20px; border-radius: 0 0 15px 15px; margin: 0 15px 20px; min-height: 80vh; }
    .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin: 0 15px 10px; }
  </style>
</head>
<body>

  <!-- 🌟 พื้นที่สำหรับดึงหน้า Login.html มาแปะ 🌟 -->
  <div id="loginComponent"></div>

  <div id="appContainer" class="container-fluid max-width-md" style="max-width: 1200px;">
    <div class="header-bar">
      <h5 class="m-0 text-primary fw-bold"><i class="fa-solid fa-cube me-2"></i>CRM System</h5>
      <div>
        <span class="me-3 fw-medium text-muted" id="displayUserName">Welcome</span>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-1"></i>ออกจากระบบ</button>
      </div>
    </div>

    <ul class="nav nav-tabs" id="crmTabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#visit" type="button"><i class="fa-solid fa-notes-medical me-2"></i>บันทึกเยี่ยม</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#doctors" type="button"><i class="fa-solid fa-user-doctor me-2"></i>แพทย์</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#hospitals" type="button"><i class="fa-solid fa-hospital me-2"></i>โรงพยาบาล</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#products" type="button"><i class="fa-solid fa-box-open me-2"></i>สินค้า</button></li>
      
      <!-- Admin Tabs -->
      <li class="nav-item" id="navBUTab" style="display: none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#bu" type="button"><i class="fa-solid fa-building me-2"></i>BU</button></li>
      <li class="nav-item" id="navTeamsTab" style="display: none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#teams" type="button"><i class="fa-solid fa-users-viewfinder me-2"></i>ทีม</button></li>
      <li class="nav-item" id="navTerritoryTab" style="display: none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#territory" type="button"><i class="fa-solid fa-map-location-dot me-2"></i>พื้นที่</button></li>
      <li class="nav-item" id="navMatrixTab" style="display: none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#matrix" type="button"><i class="fa-solid fa-table-cells me-2"></i>Rating Matrix</button></li>
      <li class="nav-item" id="navTargetTab" style="display: none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#target" type="button"><i class="fa-solid fa-bullseye me-2"></i>Target Call</button></li>
      <li class="nav-item" id="navAssignmentTab" style="display: none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#assignment" type="button"><i class="fa-solid fa-link me-2"></i>Assignment</button></li>
      <li class="nav-item" id="navIndexTab" style="display: none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#indexSetup" type="button"><i class="fa-solid fa-list-ul me-2"></i>ตั้งค่าตัวเลือก</button></li>
      <li class="nav-item" id="navDCRTab" style="display: none;"><button class="nav-link text-danger" data-bs-toggle="tab" data-bs-target="#dcr" type="button"><i class="fa-solid fa-clipboard-list me-2"></i>อนุมัติข้อมูล (DCR)</button></li>
      <li class="nav-item" id="navUsersTab" style="display: none;"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#users" type="button"><i class="fa-solid fa-user-group me-2"></i>ผู้ใช้งาน</button></li>
    </ul>

    <div class="tab-content" id="crmTabsContent">
      <div class="tab-pane fade show active" id="visit"><div id="loadingVisit" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="doctors"><div id="loadingDoctors" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="hospitals"><div id="loadingHospitals" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="products"><div id="loadingProducts" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="bu"><div id="loadingBU" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="teams"><div id="loadingTeams" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="territory"><div id="loadingTerritory" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="matrix"><div id="loadingMatrix" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="target"><div id="loadingTarget" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="assignment"><div id="loadingAssignment" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="indexSetup"><div id="loadingIndex" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="dcr"><div id="loadingDCR" class="text-center py-5"></div></div>
      <div class="tab-pane fade" id="users"><div id="loadingUsers" class="text-center py-5"></div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

  <script>
    const SUPABASE_URL = 'https://trrfwszgscftnybhhsor.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_SyOGO6gN7DGYmj0ltcvokg_y3WOtZdH'; 
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 

    window.addEventListener('load', async () => {
      // 🌟 โหลดหน้า Login มาแปะก่อนอันดับแรก
      await loadComponent('loginComponent', 'Login.html');
      
      checkSession();

      // โหลดหน้าย่อยอื่นๆ
      loadComponent('visit', 'ManageVisits.html'); 
      loadComponent('doctors', 'ManageDoctors.html'); 
      loadComponent('hospitals', 'ManageHospitals.html'); 
      loadComponent('products', 'ManageProducts.html'); 
      loadComponent('bu', 'ManageBUs.html'); 
      loadComponent('teams', 'ManageTeams.html'); 
      loadComponent('territory', 'ManageTerritory.html'); 
      loadComponent('matrix', 'ManageMatrix.html'); 
      loadComponent('target', 'ManageTarget.html'); 
      loadComponent('assignment', 'ManageAssignment.html'); 
      loadComponent('indexSetup', 'ManageIndex.html'); 
      loadComponent('dcr', 'ManageDCR.html'); 
      loadComponent('users', 'ManageUsers.html'); 
    });

    async function loadComponent(elementId, filePath) {
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error("ไม่พบไฟล์ " + filePath);
        const htmlText = await response.text();
        const container = document.getElementById(elementId);
        container.innerHTML = htmlText;
        
        const scripts = container.querySelectorAll('script');
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) newScript.src = oldScript.src;
          if (oldScript.innerHTML) newScript.innerHTML = oldScript.innerHTML;
          document.body.appendChild(newScript);
        });
      } catch (error) {
        console.error(error);
        document.getElementById(elementId).innerHTML = `<div class="alert alert-danger">❌ โหลดไฟล์ล้มเหลว: ${error.message}</div>`;
      }
    }

    async function saveUserLog(user, action, duration = "-") {
      try {
        const logData = {
          Rep_ID: user.Rep_ID || user.id,       
          Action: action,            
          Role: user.Role || user.role,           
          Device: navigator.userAgent, 
          "Session Duration": duration, 
          Whoupdated: user.Email || user.email
        };
        await supabaseClient.from('User_Logs').insert([logData]);
      } catch (err) { console.error("Log error:", err); }
    }

    function checkSession() {
      const userStr = sessionStorage.getItem('crmUser');
      const loginScreen = document.getElementById('loginScreen');
      const appContainer = document.getElementById('appContainer');

      if (userStr) {
        const user = JSON.parse(userStr);
        if (loginScreen) loginScreen.style.display = 'none';
        if (appContainer) appContainer.style.display = 'block';
        
        const nameDisplay = document.getElementById('displayUserName');
        // ใช้ชื่อ หรือ email (รองรับทั้ง key ตัวพิมพ์เล็กและใหญ่)
        const dName = user.Rep_Name || user.rep_name || user.name || user.Email || user.email;
        if(nameDisplay) nameDisplay.innerText = "👨‍💼 " + dName; 
        
        const userRole = user.Role || user.role;
        const adminTabs = [
          'navUsersTab', 'navTeamsTab', 'navBUTab', 'navTerritoryTab', 
          'navMatrixTab', 'navTargetTab', 'navAssignmentTab', 'navIndexTab', 'navDCRTab'
        ];

        adminTabs.forEach(tabId => {
          const tab = document.getElementById(tabId);
          if (tab) {
             tab.style.display = (userRole === 'Admin') ? 'block' : 'none';
          }
        });
      } else {
        if (loginScreen) loginScreen.style.display = 'flex';
        if (appContainer) appContainer.style.display = 'none';
      }
    }

    function logout() { 
      const userStr = sessionStorage.getItem('crmUser');
      const loginTime = sessionStorage.getItem('loginTime');

      if (userStr) {
        const user = JSON.parse(userStr);
        let sessionDuration = "-";
        if (loginTime) {
          const diffMs = Date.now() - parseInt(loginTime);
          sessionDuration = Math.round(diffMs / 60000) + " mins";
        }
        saveUserLog(user, "Logout", sessionDuration);
      }
      sessionStorage.removeItem('crmUser');
      sessionStorage.removeItem('loginTime'); 
      checkSession();
    }
  </script>
</body>
</html>
