<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM System</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    #appContainer { padding-top: 15px; display: none; } 
    .nav-tabs { background: #fff; padding: 10px 10px 0; border-bottom: 2px solid #e7f1ff; border-radius: 15px 15px 0 0; margin: 0 15px; }
    .nav-link { border: none !important; color: #6c757d; font-weight: 500; padding: 12px 20px; border-radius: 10px 10px 0 0 !important; margin-right: 5px; }
    .nav-link.active { background-color: #e7f1ff !important; color: #0d6efd !important; font-weight: bold; border-bottom: 3px solid #0d6efd !important; }
    .tab-content { background: #fff; padding: 20px; border-radius: 0 0 15px 15px; margin: 0 15px 20px; min-height: 80vh; }
    .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin: 0 15px 10px; }
  </style>
</head>
<body>

  <div id="loginScreen" class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: #f0f2f5; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;">
    <div class="card p-5 shadow-lg border-0" style="width: 100%; max-width: 420px; border-radius: 20px;">
      <div class="text-center mb-4">
        <div class="bg-primary text-white d-inline-flex justify-content-center align-items-center mb-3" style="width: 70px; height: 70px; border-radius: 50%;">
          <i class="fa-solid fa-user-lock fs-2"></i>
        </div>
        <h3 class="fw-bold text-primary">ระบบ CRM</h3>
        <p class="text-muted">กรุณาเข้าสู่ระบบด้วยอีเมลบริษัท</p>
      </div>
      
      <form id="loginForm" onsubmit="handleLogin(event); return false;">
        <div class="mb-3">
          <label class="form-label fw-medium text-dark">อีเมล (Email)</label>
          <div class="input-group">
            <span class="input-group-text bg-light text-primary"><i class="fa-solid fa-envelope"></i></span>
            <input type="email" class="form-control" id="loginEmail" required placeholder="เช่น surasak.jankasem@roche.com">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium text-dark">รหัสผ่าน (Password)</label>
          <div class="input-group">
            <span class="input-group-text bg-light text-primary"><i class="fa-solid fa-key"></i></span>
            <input type="password" class="form-control" id="loginPassword" required placeholder="ใส่รหัสผ่านของคุณ">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-2" id="loginBtn" style="border-radius: 8px; font-size: 1.1rem;">
          เข้าสู่ระบบ
        </button>
      </form>
    </div>
  </div>

  <div id="appContainer" class="container-fluid max-width-md" style="max-width: 1200px;">
    <div class="header-bar">
      <h5 class="m-0 text-primary fw-bold"><i class="fa-solid fa-cube me-2"></i>CRM System</h5>
      <div>
        <span class="me-3 fw-medium text-muted" id="displayUserName">Welcome</span>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-1"></i>ออกจากระบบ</button>
      </div>
    </div>

    <!-- แท็บเมนู -->
    <ul class="nav nav-tabs" id="crmTabs" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#visit" type="button"><i class="fa-solid fa-notes-medical me-2"></i>บันทึกเยี่ยม</button>
      </li>
      <!-- 🌟 เพิ่มแท็บแพทย์ -->
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#doctors" type="button"><i class="fa-solid fa-user-doctor me-2"></i>แพทย์</button>
      </li>
      <li class="nav-item" id="navUsersTab" style="display: none;">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#users" type="button"><i class="fa-solid fa-user-group me-2"></i>ผู้ใช้งาน</button>
      </li>
    </ul>

    <div class="tab-content" id="crmTabsContent">
      <div class="tab-pane fade show active" id="visit">
        <div id="loadingVisit" class="text-center py-5">
           <i class="fa-solid fa-spinner fa-spin fa-2x text-primary mb-3"></i><p>กำลังโหลดหน้าบันทึกเยี่ยม...</p>
        </div>
      </div>
      <!-- 🌟 โหลดหน้าแพทย์ -->
      <div class="tab-pane fade" id="doctors">
        <div id="loadingDoctors" class="text-center py-5">
           <i class="fa-solid fa-spinner fa-spin fa-2x text-primary mb-3"></i><p>กำลังโหลดหน้าข้อมูลแพทย์...</p>
        </div>
      </div>
      <div class="tab-pane fade" id="users">
        <div id="loadingUsers" class="text-center py-5">
           <i class="fa-solid fa-spinner fa-spin fa-2x text-success mb-3"></i><p>กำลังโหลดหน้าผู้ใช้งาน...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

  <script>
    const SUPABASE_URL = 'https://trrfwszgscftnybhhsor.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_SyOGO6gN7DGYmj0ltcvokg_y3WOtZdH'; 
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 

    window.addEventListener('load', () => {
      checkSession();
      loadComponent('visit', 'ManageVisits.html'); 
      loadComponent('doctors', 'ManageDoctors.html'); // 🌟 โหลดไฟล์ ManageDoctors.html
      loadComponent('users', 'ManageUsers.html'); 
    });

    async function loadComponent(elementId, filePath) {
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error("ไม่พบไฟล์ " + filePath);
        const htmlText = await response.text();
        const container = document.getElementById(elementId);
        container.innerHTML = htmlText;
        
        const scripts = container.querySelectorAll('script');
        scripts.forEach(oldScript => {
          const newScript = document.createElement('script');
          if (oldScript.src) newScript.src = oldScript.src;
          if (oldScript.innerHTML) newScript.innerHTML = oldScript.innerHTML;
          document.body.appendChild(newScript);
        });
      } catch (error) {
        console.error(error);
        document.getElementById(elementId).innerHTML = `<div class="alert alert-danger">❌ โหลดไฟล์ล้มเหลว: ${error.message}</div>`;
      }
    }

    async function saveUserLog(user, action, duration = "-") {
      try {
        const logData = {
          Rep_ID: user.Rep_ID,       
          Action: action,            
          Role: user.Role,           
          Device: navigator.userAgent, 
          "Session Duration": duration, 
          Whoupdated: user.Email
        };
        const { error } = await supabaseClient.from('User_Logs').insert([logData]);
        if (error) throw error;
      } catch (err) {
        console.error("❌ ไม่สามารถบันทึก Log ได้:", err.message);
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>กำลังตรวจสอบ...`;

      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value.trim();

      try {
        const { data: users, error } = await supabaseClient
          .from('Rep_Users') 
          .select('*')
          .eq('Email', email)
          .eq('Password', pass)
          .eq('Status', 'Active'); 

        if (error) throw error;

        if (users && users.length > 0) {
          const user = users[0];
          sessionStorage.setItem('crmUser', JSON.stringify(user));
          sessionStorage.setItem('loginTime', Date.now()); 
          
          saveUserLog(user, "Login");
          document.getElementById('loginForm').reset();
          checkSession();
          
          if (typeof loadVisitLogs === 'function') loadVisitLogs();
          if (typeof loadVisitDropdowns === 'function') loadVisitDropdowns();
          
        } else {
          alert("❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง หรือบัญชีถูกระงับ");
        }
      } catch (err) {
        alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล: " + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'เข้าสู่ระบบ';
      }
    }

    function checkSession() {
      const userStr = sessionStorage.getItem('crmUser');
      const loginScreen = document.getElementById('loginScreen');
      const appContainer = document.getElementById('appContainer');

      if (userStr) {
        const user = JSON.parse(userStr);
        if (loginScreen) loginScreen.style.display = 'none';
        if (appContainer) appContainer.style.display = 'block';
        
        const nameDisplay = document.getElementById('displayUserName');
        if(nameDisplay) nameDisplay.innerText = "👨‍💼 " + (user.Rep_Name || user.Email); 
        
        const usersTab = document.getElementById('navUsersTab');
        if (user.Role === 'Admin') {
          if (usersTab) usersTab.style.display = 'block';
        } else {
          if (usersTab) usersTab.style.display = 'none';
        }

      } else {
        if (loginScreen) loginScreen.style.display = '';
        if (appContainer) appContainer.style.display = 'none';
      }
    }

    function logout() { 
      const userStr = sessionStorage.getItem('crmUser');
      const loginTime = sessionStorage.getItem('loginTime');

      if (userStr) {
        const user = JSON.parse(userStr);
        let sessionDuration = "-";
        if (loginTime) {
          const diffMs = Date.now() - parseInt(loginTime);
          const diffMins = Math.round(diffMs / 60000); 
          sessionDuration = diffMins + " mins";
        }
        saveUserLog(user, "Logout", sessionDuration);
      }

      sessionStorage.removeItem('crmUser');
      sessionStorage.removeItem('loginTime'); 
      checkSession();
    }
  </script>
</body>
</html>
