<div class="container-fluid p-0" style="max-width: 1000px; margin: 0 auto;">
  
  <div id="matrixListView">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="text-primary fw-bold mb-0">🔠 จัดการเงื่อนไขลูกค้า (Rating Matrix)</h4>
      <button type="button" class="btn btn-primary fw-bold shadow-sm" onclick="openAddMatrixView()">
        <i class="fa-solid fa-plus me-2"></i>เพิ่มเงื่อนไขใหม่
      </button>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label fw-medium text-muted small mb-1">ค้นหาสินค้า (Product)</label>
        <select class="form-select shadow-sm" id="filterMatrixProduct" onchange="filterMatrix()" style="border-radius: 8px;">
          <option value="">- ทุกสินค้า -</option>
        </select>
      </div>
    </div>

    <div class="card p-4 border-0 shadow-sm" style="border-radius: 12px;">
      <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle text-center">
          <thead class="table-dark">
            <tr>
              <th>Product Name</th>
              <th>Adoption</th>
              <th>Potential</th>
              <th>Classification (Auto)</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="matrixTableBody">
            <tr><td colspan="5" class="py-4">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="matrixFormView" class="d-none">
    <div class="d-flex align-items-center mb-4">
      <button class="btn btn-outline-secondary fw-bold me-3" onclick="switchMatrixView('matrixListView')">
        <i class="fa-solid fa-arrow-left me-1"></i> ย้อนกลับ
      </button>
      <h4 class="text-primary fw-bold mb-0" id="matrixFormTitle">เพิ่มเงื่อนไข Matrix</h4>
    </div>

    <div class="card p-4 border-0 shadow-sm" style="border-radius: 12px;">
      <form id="matrixForm" onsubmit="handleSaveMatrix(event)">
        <input type="hidden" id="editMatrixOldProduct">
        <input type="hidden" id="editMatrixOldAdopt">
        <input type="hidden" id="editMatrixOldPot">
        
        <div class="row">
          <div class="col-md-12 mb-3">
            <label class="form-label fw-medium">สินค้า (Product)</label>
            <select class="form-select bg-white" id="matrixProduct" required></select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-medium">Adoption</label>
            <select class="form-select bg-white" id="matrixAdopt" required></select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-medium">Potential</label>
            <select class="form-select bg-white" id="matrixPot" required></select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label fw-medium text-primary">ได้ผลลัพธ์ = Classification</label>
            <select class="form-select border-primary" id="matrixClass" required></select>
          </div>
        </div>
        <div class="text-end mt-2">
          <button type="button" class="btn btn-light border fw-bold px-4 me-2" onclick="switchMatrixView('matrixListView')">ยกเลิก</button>
          <button type="submit" class="btn btn-primary fw-bold px-4" id="submitMatrixBtn">บันทึกข้อมูล</button>
        </div>
      </form>
    </div>
  </div>

  <div id="matrixProfileView" class="d-none">
    <div class="d-flex align-items-center mb-4">
      <button class="btn btn-outline-secondary fw-bold me-3" onclick="switchMatrixView('matrixListView')">
        <i class="fa-solid fa-arrow-left me-1"></i> ย้อนกลับ
      </button>
      <button class="btn btn-warning text-dark fw-bold me-3 shadow-sm" onclick="openEditMatrixView(currentSelectedMatrixId)">
        <i class="fa-solid fa-pen-to-square me-1"></i> ✏️ แก้ไขข้อมูล Matrix
      </button>
      <h4 class="text-info fw-bold mb-0" id="viewMatrixTitleName" style="color: #0dcaf0 !important;">🔠 ข้อมูลเงื่อนไข Matrix</h4>
    </div>

    <div class="card p-4 border-0 shadow-sm" style="border-radius: 12px;">
      <div class="row">
        <div class="col-md-12 mb-3">
          <label class="text-muted small">สินค้า (Product)</label>
          <input type="text" class="form-control bg-light fw-medium" id="viewMatrixProduct" disabled>
        </div>
        <div class="col-md-4 mb-3">
          <label class="text-muted small">Adoption</label>
          <input type="text" class="form-control bg-light fw-medium" id="viewMatrixAdopt" disabled>
        </div>
        <div class="col-md-4 mb-3">
          <label class="text-muted small">Potential</label>
          <input type="text" class="form-control bg-light fw-medium" id="viewMatrixPot" disabled>
        </div>
        <div class="col-md-4 mb-3">
          <label class="text-muted small">ได้ผลลัพธ์ = Classification</label>
          <input type="text" class="form-control bg-light fw-bold fs-5 text-primary" id="viewMatrixClass" disabled>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  let globalMatrixList = [];
  let globalProductsForMatrix = [];
  let isMatrixDataLoaded = false;
  let isMatrixEditMode = false;
  let currentSelectedMatrixId = ""; 

  // ข้อมูลคงที่สำหรับ Dropdown (หากมีตารางแยกในอนาคตก็ปรับดึงจากฐานข้อมูลได้)
  const ADOPTION_OPTS = ['A', 'B', 'C', 'D'];
  const POTENTIAL_OPTS = ['High', 'Medium', 'Low', 'None'];
  const CLASS_OPTS = ['A', 'B', 'C', 'D', 'E'];

  window.addEventListener('load', function() {
    loadProductsForMatrix();
  });

  function switchMatrixView(viewId) {
    const views = ['matrixListView', 'matrixFormView', 'matrixProfileView'];
    views.forEach(v => {
      const el = document.getElementById(v);
      if (el) el.classList.add('d-none');
    });
    const target = document.getElementById(viewId);
    if(target) target.classList.remove('d-none');
  }

  // 🌟 ดึงข้อมูลสินค้ามาเพื่อใช้ใน Dropdown และแสดงผล
  async function loadProductsForMatrix() {
    try {
      const { data, error } = await supabaseClient.from('Products').select('Product_ID, Product').eq('Status', 'Active');
      if (error) throw error;
      globalProductsForMatrix = data;
      
      let pOptions = '<option value="">- เลือกสินค้า -</option>';
      let pfOptions = '<option value="">- ทุกสินค้า -</option>';
      globalProductsForMatrix.forEach(p => { 
        pOptions += `<option value="${p.Product_ID}">${p.Product}</option>`;
        pfOptions += `<option value="${p.Product_ID}">${p.Product}</option>`;
      });
      document.getElementById('matrixProduct').innerHTML = pOptions;
      document.getElementById('filterMatrixProduct').innerHTML = pfOptions;

      // สร้าง Dropdown แบบตายตัว
      let adoptOpts = '<option value="">- เลือก -</option>'; ADOPTION_OPTS.forEach(v => adoptOpts += `<option value="${v}">${v}</option>`);
      let potOpts = '<option value="">- เลือก -</option>'; POTENTIAL_OPTS.forEach(v => potOpts += `<option value="${v}">${v}</option>`);
      let classOpts = '<option value="">- เลือก -</option>'; CLASS_OPTS.forEach(v => classOpts += `<option value="${v}">${v}</option>`);
      
      document.getElementById('matrixAdopt').innerHTML = adoptOpts;
      document.getElementById('matrixPot').innerHTML = potOpts;
      document.getElementById('matrixClass').innerHTML = classOpts;

      loadMatrixData();
    } catch (err) {
      console.error("Error loading products for Matrix:", err.message);
    }
  }

  // 🌟 ดึงข้อมูล Matrix จาก Supabase
  async function loadMatrixData() {
    isMatrixDataLoaded = false;
    const tbody = document.getElementById('matrixTableBody');
    if(tbody) tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4">กำลังโหลดข้อมูล...</td></tr>`;

    try {
      const { data, error } = await supabaseClient.from('Rating_Matrix').select('*');
      if (error) throw error;

      globalMatrixList = data.map(m => {
        const prodInfo = globalProductsForMatrix.find(p => p.Product_ID === m.Product_ID);
        const prodName = prodInfo ? prodInfo.Product : m.Product_ID;

        return {
          compositeId: `${m.Product_ID}|${m.Adoption}|${m.Potential}`, // ใช้ขีดคั่นสร้าง ID ปลอมไว้ใช้อ้างอิง
          productId: m.Product_ID,
          productName: prodName,
          adoption: m.Adoption,
          potential: m.Potential,
          classification: m.Classification
        };
      });

      isMatrixDataLoaded = true;
      filterMatrix();
    } catch (err) {
      console.error(err);
      if(tbody) tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4">❌ โหลดข้อมูลไม่สำเร็จ: ${err.message}</td></tr>`;
    }
  }

  function filterMatrix() {
    if (!isMatrixDataLoaded) return;
    const prodTerm = document.getElementById('filterMatrixProduct').value;
    const filtered = globalMatrixList.filter(m => (prodTerm === "") || (m.productId === prodTerm));
    const tbody = document.getElementById('matrixTableBody');
    tbody.innerHTML = '';
    
    if(!filtered.length) return tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">ไม่พบข้อมูล</td></tr>';

    filtered.forEach(m => {
      tbody.innerHTML += `
        <tr>
          <td class="text-start fw-medium">
            <a href="#" class="text-decoration-none text-primary border-bottom border-primary pb-1" onclick="openViewMatrixProfile('${m.compositeId}'); return false;">
              ${m.productName}
            </a>
          </td>
          <td>${m.adoption}</td>
          <td>${m.potential}</td>
          <td><span class="badge bg-primary fs-6">${m.classification}</span></td>
          <td><button class="btn btn-sm btn-outline-primary" onclick="openEditMatrixView('${m.compositeId}')">แก้ไข</button></td>
        </tr>`;
    });
  }

  function openViewMatrixProfile(compositeId) {
    currentSelectedMatrixId = compositeId; 
    const m = globalMatrixList.find(x => x.compositeId === compositeId);
    if (!m) return;

    document.getElementById('viewMatrixTitleName').innerText = `🔠 ข้อมูลเงื่อนไข: ${m.productName}`;
    document.getElementById('viewMatrixProduct').value = m.productName;
    document.getElementById('viewMatrixAdopt').value = m.adoption || '-';
    document.getElementById('viewMatrixPot').value = m.potential || '-';
    document.getElementById('viewMatrixClass').value = m.classification || '-';

    switchMatrixView('matrixProfileView');
  }

  function openAddMatrixView() {
    isMatrixEditMode = false;
    document.getElementById('matrixFormTitle').innerText = "🔠 เพิ่มเงื่อนไข Matrix ใหม่";
    document.getElementById('matrixForm').reset();
    switchMatrixView('matrixFormView');
  }

  function openEditMatrixView(compositeId) {
    const m = globalMatrixList.find(x => x.compositeId === compositeId);
    if (!m) return;
    isMatrixEditMode = true;
    document.getElementById('matrixFormTitle').innerText = "✏️ แก้ไขเงื่อนไข Matrix";
    
    document.getElementById('editMatrixOldProduct').value = m.productId;
    document.getElementById('editMatrixOldAdopt').value = m.adoption;
    document.getElementById('editMatrixOldPot').value = m.potential;
    
    document.getElementById('matrixProduct').value = m.productId;
    document.getElementById('matrixAdopt').value = m.adoption;
    document.getElementById('matrixPot').value = m.potential;
    document.getElementById('matrixClass').value = m.classification;

    switchMatrixView('matrixFormView');
  }

  // 🌟 ฟังก์ชันบันทึกและแก้ไขข้อมูล
  async function handleSaveMatrix(e) {
    e.preventDefault();
    const btn = document.getElementById('submitMatrixBtn');
    btn.disabled = true; btn.innerHTML = "กำลังบันทึก...";

    let crmUser = null;
    try { crmUser = JSON.parse(sessionStorage.getItem('crmUser')); } catch(err) {}

    const newProductId = document.getElementById('matrixProduct').value;
    const newAdopt = document.getElementById('matrixAdopt').value;
    const newPot = document.getElementById('matrixPot').value;
    const newClass = document.getElementById('matrixClass').value;

    const payload = {
      Product_ID: newProductId,
      Adoption: newAdopt,
      Potential: newPot,
      Classification: newClass,
      Whoupdated: crmUser ? crmUser.Email : "Unknown"
    };

    try {
      if (isMatrixEditMode) {
        // 🌟 ดึงค่า PK เก่ามาเช็ค ถ้ามีการแก้ PK เราต้องลบตัวเก่าทิ้งแล้วใส่ใหม่ (เพราะ Supabase แก้ PK โดยตรงไม่ได้ง่ายๆ)
        const oldProductId = document.getElementById('editMatrixOldProduct').value;
        const oldAdopt = document.getElementById('editMatrixOldAdopt').value;
        const oldPot = document.getElementById('editMatrixOldPot').value;

        if (oldProductId !== newProductId || oldAdopt !== newAdopt || oldPot !== newPot) {
          // ลบของเก่าออกก่อน
          await supabaseClient.from('Rating_Matrix')
            .delete()
            .eq('Product_ID', oldProductId)
            .eq('Adoption', oldAdopt)
            .eq('Potential', oldPot);
          // ใส่ตัวใหม่เข้าไป
          const { error } = await supabaseClient.from('Rating_Matrix').insert([payload]);
          if (error) throw error;
        } else {
          // ถ้า PK ไม่เปลี่ยน แปลว่าแค่อัปเดต Classification
          const { error } = await supabaseClient.from('Rating_Matrix')
            .update({ Classification: newClass, Whoupdated: payload.Whoupdated })
            .eq('Product_ID', oldProductId)
            .eq('Adoption', oldAdopt)
            .eq('Potential', oldPot);
          if (error) throw error;
        }
        alert("✅ อัปเดตเงื่อนไขสำเร็จ");
      } else {
        // กรณี Insert ปกติ
        const { error } = await supabaseClient.from('Rating_Matrix').insert([payload]);
        if (error) {
          if (error.code === '23505') throw new Error("มีการกำหนดเงื่อนไขสินค้านี้ซ้ำ (Adoption และ Potential ซ้ำกัน)");
          throw error;
        }
        alert("✅ บันทึกเงื่อนไขใหม่สำเร็จ");
      }

      switchMatrixView('matrixListView');
      loadMatrixData();
    } catch (err) {
      alert("❌ บันทึกไม่สำเร็จ: " + err.message);
    } finally {
      btn.disabled = false; btn.innerHTML = "บันทึกข้อมูล";
    }
  }
</script>
