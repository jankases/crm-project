<div class="container-fluid p-0" style="max-width: 1100px; margin: 0 auto;">
  
  <!-- ================= 1. หน้ารายชื่อผู้ใช้งาน (List View) ================= -->
  <div id="userListView">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="text-primary fw-bold mb-0">👥 จัดการผู้ใช้งาน (Users)</h4>
      <button type="button" class="btn btn-success fw-bold shadow-sm" onclick="openAddUserView()">
        <i class="fa-solid fa-user-plus me-2"></i>เพิ่มผู้ใช้งานใหม่ (Add User)
      </button>
    </div>

    <div class="row mb-3">
      <div class="col-md-6">
        <div class="input-group shadow-sm" style="border-radius: 8px; overflow: hidden;">
          <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
          <input type="text" class="form-control border-start-0 ps-0" id="searchUser" placeholder="ค้นหาด้วยชื่อ, อีเมล หรือบทบาท..." onkeyup="filterUsers()">
        </div>
      </div>
    </div>

    <div class="card p-4 border-0 shadow-sm" style="border-radius: 12px;">
      <h5 class="mb-3 fw-bold">รายชื่อผู้ใช้งานทั้งหมด</h5>
      <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle text-center">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>ขอบเขตความรับผิดชอบ (Territory)</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="6" class="py-4">กำลังโหลดข้อมูล...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ================= 2. หน้าเพิ่ม/แก้ไข ข้อมูลผู้ใช้งาน (Form View) ================= -->
  <div id="userFormView" class="d-none">
    <div class="d-flex align-items-center mb-4">
      <button class="btn btn-outline-secondary fw-bold me-3" onclick="switchUserView('userListView')">
        <i class="fa-solid fa-arrow-left me-1"></i> ย้อนกลับ
      </button>
      <h4 class="text-primary fw-bold mb-0" id="userFormTitle">เพิ่มผู้ใช้งานใหม่</h4>
    </div>

    <div class="card p-4 border-0 shadow-sm" style="border-radius: 12px;">
      <form id="userForm" onsubmit="handleSaveUser(event)">
        <input type="hidden" id="editUserId">
        
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-medium">ชื่อ-นามสกุล (Name)</label>
            <input type="text" class="form-control bg-white" id="userName" required placeholder="เช่น สมชาย ใจดี">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-medium">อีเมล (Email)</label>
            <input type="email" class="form-control bg-white" id="userEmail" required placeholder="example@roche.com">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6" id="passwordContainer">
            <label class="form-label fw-medium">รหัสผ่าน (Password)</label>
            <input type="text" class="form-control bg-white" id="userPassword">
            <small class="text-muted" id="passwordHint">ใส่เพื่อเปลี่ยนรหัสผ่าน (ถ้าไม่เปลี่ยนให้เว้นว่างไว้)</small>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-medium">บทบาท (Role)</label>
            <select class="form-select bg-white" id="userRole" required>
              <option value="Admin">Admin</option>
              <option value="BU Head">BU Head</option>
              <option value="Manager">Manager</option>
              <option value="Sales Rep">Sales Rep</option>
            </select>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label fw-medium">เขตพื้นที่ (Territory)</label>
            <select class="form-select bg-white" id="userTerritory">
              <option value="">- ไม่ระบุ -</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-medium">สถานะ (Status)</label>
            <select class="form-select bg-white" id="userStatus" required>
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>
        </div>

        <div class="text-end mt-4">
          <button type="button" class="btn btn-light border fw-bold px-4 me-2" onclick="switchUserView('userListView')">ยกเลิก</button>
          <button type="submit" class="btn btn-primary fw-bold px-4" id="submitUserBtn">บันทึกข้อมูล</button>
        </div>
      </form>
    </div>
  </div>

</div>

<script>
  // 🌟 ใช้ var เพื่อป้องกัน Error ตัวแปรชนกันข้ามหน้า
  var globalUsers = [];
  var globalUserTerritories = [];
  var isUserEditMode = false;

  window.addEventListener('load', function() {
    loadUserDropdowns();
  });

  function switchUserView(viewId) {
    document.getElementById('userListView').classList.add('d-none');
    document.getElementById('userFormView').classList.add('d-none');
    document.getElementById(viewId).classList.remove('d-none');
  }

  // ดึงข้อมูลพื้นที่มาใส่ Dropdown
  async function loadUserDropdowns() {
    try {
      const { data, error } = await supabaseClient.from('Territory').select('Territory_ID, Territory').eq('Status', 'Active');
      if (error) throw error;
      
      globalUserTerritories = data || [];
      let opts = '<option value="">- ไม่ระบุ -</option>';
      globalUserTerritories.forEach(t => {
        opts += `<option value="${t.Territory_ID}">${t.Territory}</option>`;
      });
      document.getElementById('userTerritory').innerHTML = opts;

      // โหลดผู้ใช้ต่อ
      loadUsers();
    } catch (err) {
      console.error("Error loading User Dropdowns:", err);
    }
  }

  // ดึงข้อมูลผู้ใช้งานทั้งหมด
  async function loadUsers() {
    const tbody = document.getElementById('userTableBody');
    if(tbody) tbody.innerHTML = `<tr><td colspan="6" class="py-4">กำลังโหลดข้อมูล...</td></tr>`;
    
    try {
      const { data, error } = await supabaseClient.from('Rep_Users').select('*').order('Rep_Name', { ascending: true });
      if (error) throw error;

      globalUsers = data.map(u => {
        const ter = globalUserTerritories.find(t => t.Territory_ID === u.Territory_ID);
        return {
          id: u.Rep_ID,
          name: u.Rep_Name,
          email: u.Email,
          role: u.Role,
          status: u.Status,
          territoryId: u.Territory_ID,
          territoryName: ter ? ter.Territory : u.Territory_ID
        };
      });

      filterUsers();
    } catch (err) {
      console.error(err);
      if(tbody) tbody.innerHTML = `<tr><td colspan="6" class="text-danger py-4">❌ โหลดข้อมูลไม่สำเร็จ: ${err.message}</td></tr>`;
    }
  }

  function filterUsers() {
    const term = document.getElementById('searchUser').value.toLowerCase().trim();
    const filtered = globalUsers.filter(u => 
      (u.name && u.name.toLowerCase().includes(term)) ||
      (u.role && u.role.toLowerCase().includes(term)) ||
      (u.email && u.email.toLowerCase().includes(term))
    );
    renderUserTable(filtered);
  }

  function renderUserTable(data) {
    const tbody = document.getElementById('userTableBody');
    if(!tbody) return;
    tbody.innerHTML = '';
    
    if(!data.length) return tbody.innerHTML = '<tr><td colspan="6" class="text-danger py-4">ไม่พบข้อมูลผู้ใช้งาน</td></tr>';

    data.forEach(u => {
      const badge = u.status === 'Active' ? 'bg-success' : 'bg-danger';
      const roleBadge = u.role === 'Admin' ? 'bg-danger' : (u.role === 'Sales Rep' ? 'bg-info text-dark' : 'bg-primary');
      
      tbody.innerHTML += `
        <tr>
          <td class="fw-medium text-start text-primary">${u.name || '-'}</td>
          <td>${u.territoryName || '-'}</td>
          <td>${u.email || '-'}</td>
          <td><span class="badge ${roleBadge}">${u.role || '-'}</span></td>
          <td><span class="badge ${badge}">${u.status}</span></td>
          <td>
            <button class="btn btn-sm btn-outline-primary" onclick="openEditUserView('${u.id}')">แก้ไข</button>
          </td>
        </tr>`;
    });
  }

  function openAddUserView() {
    isUserEditMode = false;
    document.getElementById('userFormTitle').innerText = '👤 เพิ่มผู้ใช้งานใหม่ (Add User)';
    document.getElementById('userForm').reset();
    document.getElementById('editUserId').value = '';
    document.getElementById('userPassword').required = true;
    document.getElementById('passwordHint').innerText = "ต้องระบุรหัสผ่านสำหรับการสร้างบัญชีใหม่";
    switchUserView('userFormView');
  }

  function openEditUserView(id) {
    const u = globalUsers.find(x => x.id === id);
    if(!u) return;

    isUserEditMode = true;
    document.getElementById('userFormTitle').innerText = '✏️ แก้ไขข้อมูลผู้ใช้งาน';
    document.getElementById('editUserId').value = u.id;
    document.getElementById('userName').value = u.name;
    document.getElementById('userEmail').value = u.email;
    document.getElementById('userRole').value = u.role;
    document.getElementById('userTerritory').value = u.territoryId || '';
    document.getElementById('userStatus').value = u.status;
    
    document.getElementById('userPassword').value = '';
    document.getElementById('userPassword').required = false;
    document.getElementById('passwordHint').innerText = "ใส่เฉพาะกรณีที่ต้องการเปลี่ยนรหัสผ่าน (ถ้าไม่เปลี่ยนให้เว้นว่างไว้)";
    
    switchUserView('userFormView');
  }

  async function handleSaveUser(e) {
    e.preventDefault();
    const btn = document.getElementById('submitUserBtn');
    btn.disabled = true; btn.innerHTML = 'กำลังบันทึก...';

    let crmUser = null;
    try { crmUser = JSON.parse(sessionStorage.getItem('crmUser')); } catch(err) {}

    const payload = {
      Rep_Name: document.getElementById('userName').value.trim(),
      Email: document.getElementById('userEmail').value.trim(),
      Role: document.getElementById('userRole').value,
      Territory_ID: document.getElementById('userTerritory').value || null,
      Status: document.getElementById('userStatus').value,
      Whoupdated: crmUser ? (crmUser.Email || crmUser.email) : 'System'
    };

    const pwd = document.getElementById('userPassword').value.trim();
    if (pwd) payload.Password = pwd; // อัปเดตรหัสผ่านเฉพาะตอนที่มีการพิมพ์เข้ามา

    try {
      if (isUserEditMode) {
        const id = document.getElementById('editUserId').value;
        const { error } = await supabaseClient.from('Rep_Users').update(payload).eq('Rep_ID', id);
        if (error) {
          if (error.code === '23505') throw new Error("อีเมลนี้มีอยู่ในระบบแล้ว");
          throw error;
        }
        alert("✅ แก้ไขข้อมูลผู้ใช้งานสำเร็จ");
      } else {
        const { error } = await supabaseClient.from('Rep_Users').insert([payload]);
        if (error) {
          if (error.code === '23505') throw new Error("อีเมลนี้มีอยู่ในระบบแล้ว");
          throw error;
        }
        alert("✅ เพิ่มผู้ใช้งานใหม่สำเร็จ");
      }
      switchUserView('userListView');
      loadUsers();
    } catch (err) {
      alert("❌ ไม่สามารถบันทึกได้: " + err.message);
    } finally {
      btn.disabled = false; btn.innerHTML = 'บันทึกข้อมูล';
    }
  }
</script>
